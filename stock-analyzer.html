<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>半導体・電線株 分析システム</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2332;
    --border: #1e3a5f;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --purple: #8b5cf6;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #475569;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 20px; font-weight: 700; color: var(--accent2); letter-spacing: -0.5px; }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .last-update { font-size: 11px; color: var(--text3); }
  .refresh-btn {
    background: var(--accent); border: none; color: white; padding: 8px 16px;
    border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { background: #2563eb; transform: translateY(-1px); }
  .refresh-btn.loading { opacity: 0.7; pointer-events: none; }

  /* Layout */
  .container { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 65px); }

  /* Sidebar */
  .sidebar {
    background: var(--surface); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 12px 8px;
  }
  .sidebar-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 8px 8px 4px; }
  .stock-card {
    padding: 10px 12px; margin: 3px 0; border-radius: 10px; cursor: pointer;
    transition: all 0.15s; border: 1px solid transparent;
    display: flex; align-items: center; gap: 10px;
  }
  .stock-card:hover { background: var(--surface2); border-color: var(--border); }
  .stock-card.active { background: rgba(59,130,246,0.12); border-color: var(--accent); }
  .stock-icon {
    width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0;
  }
  .stock-info { flex: 1; min-width: 0; }
  .stock-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stock-ticker { font-size: 11px; color: var(--text2); }
  .stock-price-mini { text-align: right; flex-shrink: 0; }
  .stock-price-mini .price { font-size: 13px; font-weight: 700; }
  .stock-price-mini .chg { font-size: 11px; font-weight: 600; }
  .up { color: var(--green); }
  .down { color: var(--red); }
  .neutral { color: var(--text2); }

  /* Main */
  .main { overflow-y: auto; background: var(--bg); }

  /* Detail View */
  .detail { padding: 20px; }
  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .detail-title { display: flex; align-items: center; gap: 14px; }
  .detail-icon { width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; }
  .detail-name h2 { font-size: 22px; font-weight: 800; }
  .detail-name .sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .price-block { text-align: right; }
  .price-big { font-size: 32px; font-weight: 800; }
  .price-chg { font-size: 15px; font-weight: 700; margin-top: 2px; }

  /* Score */
  .score-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .score-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px;
  }
  .score-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .score-val { font-size: 20px; font-weight: 800; }
  .score-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface); border-radius: 10px; padding: 4px; border: 1px solid var(--border); width: fit-content; }
  .tab { padding: 8px 18px; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text2); transition: all 0.15s; border: none; background: none; }
  .tab.active { background: var(--accent); color: white; }
  .tab:hover:not(.active) { color: var(--text); background: var(--surface2); }

  /* Period buttons */
  .period-row { display: flex; gap: 6px; margin-bottom: 12px; align-items: center; }
  .period-btn { padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text2); border: 1px solid var(--border); background: var(--surface); transition: all 0.15s; }
  .period-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .period-btn:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  /* Chart area */
  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 16px; position: relative; }
  .chart-wrap canvas { max-height: 340px; }
  .chart-label { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
  .badge-green { background: rgba(16,185,129,0.15); color: var(--green); }
  .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-yellow { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .badge-blue { background: rgba(59,130,246,0.15); color: var(--accent); }
  .badge-purple { background: rgba(139,92,246,0.15); color: var(--purple); }

  /* Indicators row */
  .indicators { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .indicator-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .ind-label { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
  .ind-val { font-size: 16px; font-weight: 800; }
  .ind-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .ind-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

  /* Prediction */
  .prediction-box {
    background: linear-gradient(135deg, rgba(59,130,246,0.08) 0%, rgba(139,92,246,0.08) 100%);
    border: 1px solid rgba(59,130,246,0.3); border-radius: 14px; padding: 20px; margin-bottom: 16px;
  }
  .prediction-title { font-size: 14px; font-weight: 700; color: var(--accent2); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .pred-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .pred-item { text-align: center; }
  .pred-period { font-size: 11px; color: var(--text2); font-weight: 600; margin-bottom: 4px; }
  .pred-price { font-size: 17px; font-weight: 800; }
  .pred-pct { font-size: 12px; font-weight: 700; margin-top: 2px; }
  .pred-conf { font-size: 10px; color: var(--text3); margin-top: 3px; }
  .pred-divider { width: 1px; background: var(--border); }

  /* Events */
  .events-section { margin-bottom: 16px; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .event-list { display: flex; flex-direction: column; gap: 6px; }
  .event-item {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; display: flex; align-items: center; gap: 12px;
  }
  .event-date { font-size: 12px; font-weight: 700; color: var(--text2); white-space: nowrap; min-width: 80px; }
  .event-type { font-size: 11px; font-weight: 700; }
  .event-desc { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Analysis */
  .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .analysis-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .ana-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
  .support-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .support-list li { display: flex; justify-content: space-between; font-size: 13px; }
  .support-list .label { color: var(--text2); }
  .support-list .val { font-weight: 700; }

  /* Signal gauge */
  .signal-gauge { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .gauge-bar { flex: 1; height: 8px; border-radius: 4px; background: linear-gradient(to right, var(--red), var(--yellow), var(--green)); position: relative; }
  .gauge-needle { width: 12px; height: 12px; border-radius: 50%; background: white; border: 2px solid var(--bg); position: absolute; top: -2px; transform: translateX(-50%); transition: left 0.5s; }
  .gauge-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--text3); margin-top: 2px; }

  /* News */
  .news-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .news-item:last-child { border-bottom: none; }
  .news-date { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
  .news-title { font-size: 13px; color: var(--text); }
  .news-src { font-size: 10px; color: var(--accent); margin-top: 2px; }

  /* Loading */
  .loading-spinner { display: flex; align-items: center; justify-content: center; height: 200px; flex-direction: column; gap: 12px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .loading-text { font-size: 13px; color: var(--text2); animation: pulse 1.5s infinite; }

  /* Error */
  .error-box { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; padding: 14px 16px; font-size: 13px; color: var(--red); margin-bottom: 12px; }

  /* Tab panes */
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* RSI zone colors */
  .rsi-ob { color: var(--red); }
  .rsi-os { color: var(--green); }
  .rsi-neu { color: var(--text2); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* Tooltip */
  .tooltip-wrap { position: relative; display: inline-flex; }
  .tooltip-tip {
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #1e293b; border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 11px; white-space: nowrap; color: var(--text);
    pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 200;
  }
  .tooltip-wrap:hover .tooltip-tip { opacity: 1; }

  /* Mini charts in sidebar - sparkline indicator */
  .trend-arrow { font-size: 14px; }

  @media (max-width: 768px) {
    .container { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .indicators { grid-template-columns: repeat(2, 1fr); }
    .pred-grid { grid-template-columns: 1fr; }
    .analysis-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

// ============================================================
// Yahoo Finance API (CORS proxy経由)
// ============================================================
const PROXIES = [
  'https://query1.finance.yahoo.com/v8/finance/chart/',
  'https://query2.finance.yahoo.com/v8/finance/chart/',
];

async function fetchYahoo(ticker, range='3mo', interval='1d') {
  const url = `${PROXIES[0]}${encodeURIComponent(ticker)}?range=${range}&interval=${interval}&includePrePost=false`;
  const res = await fetch(url, { headers: { 'User-Agent': 'Mozilla/5.0' } });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  const result = json.chart?.result?.[0];
  if (!result) throw new Error('No data');
  return result;
}

function parseOHLC(result) {
  const ts = result.timestamps;
  const q = result.indicators.quote[0];
  const adjClose = result.indicators.adjclose?.[0]?.adjclose || q.close;
  return ts.map((t, i) => ({
    date: new Date(t * 1000),
    open:   q.open[i],
    high:   q.high[i],
    low:    q.low[i],
    close:  q.close[i],
    adjClose: adjClose[i],
    volume: q.volume[i],
  })).filter(d => d.close != null);
}

// ============================================================
// Technical Analysis
// ============================================================
function calcSMA(data, period) {
  return data.map((_, i) => {
    if (i < period - 1) return null;
    const slice = data.slice(i - period + 1, i + 1);
    return slice.reduce((s, d) => s + d.close, 0) / period;
  });
}

function calcEMA(data, period) {
  const k = 2 / (period + 1);
  const result = [];
  let ema = null;
  for (const d of data) {
    if (ema === null) { ema = d.close; }
    else { ema = d.close * k + ema * (1 - k); }
    result.push(ema);
  }
  return result;
}

function calcRSI(data, period=14) {
  const gains = [], losses = [];
  for (let i = 1; i < data.length; i++) {
    const diff = data[i].close - data[i-1].close;
    gains.push(diff > 0 ? diff : 0);
    losses.push(diff < 0 ? -diff : 0);
  }
  const result = [null];
  for (let i = 0; i < gains.length; i++) {
    if (i < period - 1) { result.push(null); continue; }
    const avgG = gains.slice(i - period + 1, i + 1).reduce((s,v)=>s+v,0) / period;
    const avgL = losses.slice(i - period + 1, i + 1).reduce((s,v)=>s+v,0) / period;
    result.push(avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL));
  }
  return result;
}

function calcMACD(data) {
  const ema12 = calcEMA(data, 12);
  const ema26 = calcEMA(data, 26);
  const macdLine = ema12.map((v, i) => v - ema26[i]);
  const macdData = data.map((d, i) => ({ close: macdLine[i] }));
  const signal = calcEMA(macdData, 9);
  const hist = macdLine.map((v, i) => v - signal[i]);
  return { macdLine, signal, hist };
}

function calcBollingerBands(data, period=20, stdDev=2) {
  const sma = calcSMA(data, period);
  return data.map((_, i) => {
    if (sma[i] === null) return { upper: null, mid: null, lower: null };
    const slice = data.slice(Math.max(0, i - period + 1), i + 1);
    const mean = sma[i];
    const variance = slice.reduce((s, d) => s + (d.close - mean) ** 2, 0) / slice.length;
    const sd = Math.sqrt(variance);
    return { upper: mean + stdDev * sd, mid: mean, lower: mean - stdDev * sd };
  });
}

// ============================================================
// Price Prediction (Linear Regression + Trend)
// ============================================================
function predictPrices(data) {
  const n = Math.min(data.length, 60);
  const slice = data.slice(-n);
  const xs = slice.map((_, i) => i);
  const ys = slice.map(d => d.close);
  const xMean = xs.reduce((s,v)=>s+v,0)/n;
  const yMean = ys.reduce((s,v)=>s+v,0)/n;
  const slope = xs.reduce((s,x,i)=>s+(x-xMean)*(ys[i]-yMean),0) / xs.reduce((s,x)=>s+(x-xMean)**2,0);
  const intercept = yMean - slope * xMean;
  const rsi = calcRSI(data);
  const lastRSI = rsi.filter(v=>v!==null).slice(-1)[0] || 50;
  const sma20 = calcSMA(data, 20);
  const sma50 = calcSMA(data, Math.min(50, data.length));
  const lastSMA20 = sma20.filter(v=>v!==null).slice(-1)[0];
  const lastSMA50 = sma50.filter(v=>v!==null).slice(-1)[0];
  const lastClose = data[data.length-1].close;
  // Momentum factor
  const momentum = lastSMA20 && lastSMA50 ? (lastSMA20 > lastSMA50 ? 1.01 : 0.99) : 1;
  const rsiMult = lastRSI > 70 ? 0.98 : lastRSI < 30 ? 1.02 : 1.0;
  const predict = (days) => {
    const base = intercept + slope * (n + days);
    return base * momentum * rsiMult;
  };
  const conf = (days) => Math.max(40, 85 - days * 0.3);
  return {
    '1mo': { price: predict(21), conf: conf(21) },
    '3mo': { price: predict(63), conf: conf(63) },
    '6mo': { price: predict(126), conf: conf(126) },
    trend: slope > 0 ? 'UP' : 'DOWN',
    rsi: lastRSI,
  };
}

// ============================================================
// Format helpers
// ============================================================
function fmt(v, currency, decimals=2) {
  if (v == null || isNaN(v)) return '—';
  if (currency === 'JPY') return '¥' + Math.round(v).toLocaleString();
  return '$' + v.toFixed(decimals);
}
function fmtPct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}
function pctClass(v) { return v > 0 ? 'up' : v < 0 ? 'down' : 'neutral'; }

function renderSidebar() {
  const usEl = document.getElementById('usStocks');

  usEl.innerHTML = '';

  for (const s of STOCKS) {
    const d = stockData[s.id];

    card.className = 'stock-card' + (currentStock?.id === s.id ? ' active' : '');

    card.innerHTML = `
      <div class="stock-icon" style="background:${s.color}22;color:${s.color}">${s.ticker.replace('.T','').slice(0,4)}</div>
      <div class="stock-info">

      </div>`;
    (s.market === 'US' ? usEl : jpEl).appendChild(card);
  }
}

// ============================================================
// Fetch all stock prices (latest)
// ============================================================
async function fetchAllPrices() {
  const promises = STOCKS.map(async s => {
    try {
      const result = await fetchYahoo(s.ticker, '5d', '1d');
      const ohlc = parseOHLC(result);
      const last = ohlc[ohlc.length-1];
      const prev = ohlc[ohlc.length-2];
      const chgPct = prev ? (last.close - prev.close) / prev.close * 100 : 0;
      stockData[s.id] = { price: last.close, chgPct, meta: result.meta };
    } catch(e) {
      stockData[s.id] = { price: null, chgPct: null, error: e.message };
    }
  });
  await Promise.all(promises);
  renderSidebar();
  document.getElementById('lastUpdate').textContent = '最終更新: ' + new Date().toLocaleTimeString('ja-JP');
}

// ============================================================
// Select stock & show detail
// ============================================================
async function selectStock(id) {
  currentStock = STOCKS.find(s => s.id === id);
  renderSidebar();
  showLoading();
  try {
    const result = await fetchYahoo(currentStock.ticker, currentPeriod, '1d');
    const ohlc = parseOHLC(result);
    renderDetail(ohlc, result.meta);
  } catch(e) {
    showError('データ取得に失敗しました: ' + e.message);
  }
}

        </div>
      </div>
    </div>

    <!-- Analysis tab -->
    <div class="tab-pane ${currentTab==='analysis'?'active':''}" id="pane-analysis">
      <div class="analysis-grid">
        <div class="analysis-card">
          <div class="ana-title">🟢 強気シナリオ</div>
          <div style="font-size:13px;line-height:1.7;color:var(--text)">${analysis.bull || '—'}</div>
        </div>
        <div class="analysis-card">
          <div class="ana-title">🔴 リスク・弱気シナリオ</div>
          <div style="font-size:13px;line-height:1.7;color:var(--text)">${analysis.bear || '—'}</div>
        </div>
      </div>
      <div class="analysis-card" style="margin-bottom:14px;">
        <div class="ana-title">📌 投資テーゼ</div>
        <div style="font-size:13px;line-height:1.7;color:var(--text)">${analysis.thesis || '—'}</div>
      </div>
      <div class="analysis-card">
        <div class="ana-title">テクニカル サポート・レジスタンス</div>
        <ul class="support-list">
          ${generateSupportLevels(ohlc, cur)}
        </ul>
        <div style="margin-top:14px;">
          <div style="font-size:11px;color:var(--text3);margin-bottom:6px;">総合シグナル強度</div>
          <div class="signal-gauge">
            <span style="font-size:11px;color:var(--red)">売</span>
            <div class="gauge-bar">
              <div class="gauge-needle" style="left:${signalPct}%"></div>
            </div>
            <span style="font-size:11px;color:var(--green)">買</span>
          </div>
          <div class="gauge-labels"><span>強売</span><span>売</span><span>中立</span><span>買</span><span>強買</span></div>
        </div>
      </div>
    </div>
  </div>`;

  // Render charts after DOM update
  setTimeout(() => {
    renderCharts(ohlc, pred);
  }, 50);
}

function generateSupportLevels(ohlc, cur) {
  const fmtCur = (v) => fmt(v, cur, cur==='JPY'?0:2);
  const last = ohlc[ohlc.length-1].close;
  const sma20 = calcSMA(ohlc, 20).filter(v=>v!=null).slice(-1)[0];
  const sma50 = calcSMA(ohlc, Math.min(50,ohlc.length)).filter(v=>v!=null).slice(-1)[0];
  const bb = calcBollingerBands(ohlc).slice(-1)[0];
  const items = [
    { label:'現在値',          val: last,      note:'' },
    { label:'SMA20',          val: sma20,     note: last > sma20 ? '↑ 上' : '↓ 下' },
    { label:'SMA50',          val: sma50,     note: last > sma50 ? '↑ 上' : '↓ 下' },
    { label:'BB上限 (2σ)',    val: bb.upper,  note:'レジスタンス' },
    { label:'BB中心',         val: bb.mid,    note:'ミッド' },
    { label:'BB下限 (2σ)',    val: bb.lower,  note:'サポート' },
  ];
  return items.map(it => `
    <li>
      <span class="label">${it.label}</span>
      <span class="val">${fmtCur(it.val)} <span style="font-size:10px;color:var(--text3)">${it.note}</span></span>
    </li>`).join('');
}

// ============================================================
// Chart Rendering
// ============================================================
let showBB = true, showSMA = true;

function toggleIndicator(type) {
  if (type === 'bb') { showBB = !showBB; document.getElementById('toggleBB').classList.toggle('active', showBB); }
  if (type === 'sma') { showSMA = !showSMA; document.getElementById('toggleSMA').classList.toggle('active', showSMA); }
  // Re-render (reload data)
  if (currentStock) selectStock(currentStock.id);
}

function destroyChart(id) {
  const existing = Chart.getChart(id);
  if (existing) existing.destroy();
}

function renderCharts(ohlc, pred) {
  const labels = ohlc.map(d => d.date.toLocaleDateString('ja-JP', {month:'short',day:'numeric'}));
  const closes = ohlc.map(d => d.close);
  const s = currentStock;
  const color = s.color;

  // --- Price Chart ---
  destroyChart('priceChart');
  const sma20 = calcSMA(ohlc, 20);
  const sma50 = calcSMA(ohlc, Math.min(50, ohlc.length));
  const bb = calcBollingerBands(ohlc);
  const bbUpper = bb.map(b => b.upper);
  const bbLower = bb.map(b => b.lower);

  const priceDatasets = [
    { label:'終値', data: closes, borderColor: color, borderWidth: 2, pointRadius: 0, tension: 0.3, fill: false, order: 0 },
  ];
  if (showSMA) {
    priceDatasets.push({ label:'SMA20', data: sma20, borderColor:'#f59e0b', borderWidth:1.5, pointRadius:0, tension:0, fill:false, borderDash:[4,2], order:1 });
    priceDatasets.push({ label:'SMA50', data: sma50, borderColor:'#8b5cf6', borderWidth:1.5, pointRadius:0, tension:0, fill:false, borderDash:[4,2], order:2 });
  }
  if (showBB) {
    priceDatasets.push({ label:'BB上限', data: bbUpper, borderColor:'rgba(148,163,184,0.4)', borderWidth:1, pointRadius:0, fill:false, borderDash:[2,3], order:3 });
    priceDatasets.push({ label:'BB下限', data: bbLower, borderColor:'rgba(148,163,184,0.4)', borderWidth:1, pointRadius:0, fill:'+1', backgroundColor:'rgba(148,163,184,0.04)', borderDash:[2,3], order:4 });
  }

  new Chart(document.getElementById('priceChart'), {
    type: 'line',
    data: { labels, datasets: priceDatasets },
    options: chartOpts({ yTitle: s.market === 'JP' ? '¥' : '$', stepSize: null }),
  });

  // --- RSI ---
  destroyChart('rsiChart');
  const rsiArr = calcRSI(ohlc);
  new Chart(document.getElementById('rsiChart'), {
    type: 'line',
    data: { labels, datasets: [{
      label:'RSI', data: rsiArr, borderColor:'#06b6d4', borderWidth:1.5, pointRadius:0, fill:false, tension:0.2
    }]},
    options: {
      ...chartOpts({ yMin:0, yMax:100 }),
      plugins: {
        ...chartOpts({}).plugins,
        annotation: { annotations: {
          ob: { type:'line', yMin:70, yMax:70, borderColor:'rgba(239,68,68,0.4)', borderWidth:1 },
          os: { type:'line', yMin:30, yMax:30, borderColor:'rgba(16,185,129,0.4)', borderWidth:1 },
        }}
      }
    }
  });

  // --- MACD ---
  destroyChart('macdChart');
  const { macdLine, signal, hist } = calcMACD(ohlc);
  new Chart(document.getElementById('macdChart'), {
    type: 'bar',
    data: { labels, datasets: [
      { label:'ヒスト', data: hist, backgroundColor: hist.map(v => v >= 0 ? 'rgba(16,185,129,0.5)' : 'rgba(239,68,68,0.5)'), borderWidth:0, order:2 },
      { label:'MACD', data: macdLine, type:'line', borderColor:'#3b82f6', borderWidth:1.5, pointRadius:0, fill:false, order:1 },
      { label:'シグナル', data: signal, type:'line', borderColor:'#f59e0b', borderWidth:1, pointRadius:0, fill:false, order:0 },
    ]},
    options: chartOpts({}),
  });

  // --- Volume ---
  destroyChart('volumeChart');
  const volumes = ohlc.map(d => d.volume);
  const volColors = ohlc.map((d,i) => i>0 && d.close >= ohlc[i-1].close ? 'rgba(16,185,129,0.6)' : 'rgba(239,68,68,0.6)');
  new Chart(document.getElementById('volumeChart'), {
    type: 'bar',
    data: { labels, datasets: [{ label:'出来高', data: volumes, backgroundColor: volColors, borderWidth:0 }]},
    options: chartOpts({}),
  });

  // --- Prediction Chart ---
  if (document.getElementById('predictChart')) {
    destroyChart('predictChart');
    const actualLabels = [...labels];
    const actualData = [...closes];
    // Add future points
    const last = ohlc[ohlc.length-1];
    const futureLabels = ['1ヶ月後','3ヶ月後','6ヶ月後'];
    const futurePrices = [pred['1mo'].price, pred['3mo'].price, pred['6mo'].price];
    const allLabels = [...actualLabels, ...futureLabels];
    const histData = [...actualData, null, null, null];
    const predData = [...Array(actualData.length-1).fill(null), last.close, ...futurePrices];
    const bearData = [...Array(actualData.length-1).fill(null), last.close, ...futurePrices.map(v=>v*0.93)];
    const bullData = [...Array(actualData.length-1).fill(null), last.close, ...futurePrices.map(v=>v*1.07)];

    new Chart(document.getElementById('predictChart'), {
      type: 'line',
      data: { labels: allLabels, datasets: [
        { label:'実績', data: histData, borderColor: color, borderWidth:2, pointRadius:0, fill:false },
        { label:'予測(中央)', data: predData, borderColor:'#8b5cf6', borderWidth:2, borderDash:[6,3], pointRadius:[...Array(actualData.length-1).fill(0),4,4,4,4], fill:false },
        { label:'強気シナリオ', data: bullData, borderColor:'rgba(16,185,129,0.4)', borderWidth:1, borderDash:[2,4], pointRadius:0, fill:'-1', backgroundColor:'rgba(16,185,129,0.06)' },
        { label:'弱気シナリオ', data: bearData, borderColor:'rgba(239,68,68,0.4)', borderWidth:1, borderDash:[2,4], pointRadius:0, fill:'+1', backgroundColor:'rgba(239,68,68,0.06)' },
      ]},
      options: chartOpts({ yTitle: s.market === 'JP' ? '¥' : '$' }),
    });
  }

  // Set active state on period/indicator buttons
  document.querySelectorAll('.period-btn').forEach(btn => {
    if (btn.id === 'toggleBB') btn.classList.toggle('active', showBB);
    else if (btn.id === 'toggleSMA') btn.classList.toggle('active', showSMA);
  });
}

function chartOpts({ yTitle='', yMin=undefined, yMax=undefined }) {
  return {
    responsive: true, maintainAspectRatio: true,
    interaction: { mode:'index', intersect:false },
    plugins: {
      legend: { labels: { color:'#94a3b8', font:{ size:11 }, boxWidth:12 } },
      tooltip: { backgroundColor:'#1a2332', borderColor:'#1e3a5f', borderWidth:1, titleColor:'#e2e8f0', bodyColor:'#94a3b8' },
    },
    scales: {
      x: { ticks:{ color:'#475569', font:{size:10}, maxTicksLimit:8, maxRotation:0 }, grid:{ color:'rgba(30,58,95,0.4)' } },
      y: { ticks:{ color:'#475569', font:{size:10} }, grid:{ color:'rgba(30,58,95,0.4)' }, min:yMin, max:yMax,
        title: yTitle ? { display:true, text:yTitle, color:'#475569', font:{size:10} } : { display:false } },
    }
  };
}

// ============================================================
// Tab / Period switching
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  const pane = document.getElementById('pane-' + tab);
  if (pane) pane.classList.add('active');
  // Re-render charts when switching to chart/predict
  if ((tab === 'chart' || tab === 'predict') && currentStock) {
    setTimeout(() => selectStock(currentStock.id), 10);
  }
}

function changePeriod(p) {
  currentPeriod = p;
  if (currentStock) selectStock(currentStock.id);
}

// ============================================================
// Refresh all
// ============================================================
async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  btn.classList.add('loading');
  icon.style.animation = 'spin 0.5s linear infinite';
  icon.style.display = 'inline-block';
  await fetchAllPrices();
  if (currentStock) await selectStock(currentStock.id);
  btn.classList.remove('loading');
  icon.style.animation = '';
}

// ============================================================
// Init
// ============================================================
(async function init() {
  renderSidebar();
  await fetchAllPrices();
  // Auto-select first stock
  await selectStock(STOCKS[0].id);
})();
</script>
